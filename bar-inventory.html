<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Bar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAF8F3;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1A1714;
    --muted: #7A746C;
    --accent: #2E1A0E;
    --amber: #C17E2A;
    --amber-light: #FDF3E3;
    --amber-dark: #7A4F0F;
    --red-light: #FDF0EF;
    --red: #B94040;
    --green-light: #EEF6EE;
    --green: #2E6B3A;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  /* Header */
  .site-header {
    background: var(--accent);
    color: #FAF8F3;
    padding: 2rem 1.5rem 1.5rem;
  }
  .site-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: -0.5px;
  }
  .site-header p {
    font-size: 13px;
    opacity: 0.6;
    margin-top: 4px;
  }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 1.25rem 1.25rem 0;
  }
  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.875rem 1rem;
    text-align: center;
  }
  .stat-num {
    font-size: 24px;
    font-weight: 500;
    color: var(--text);
    font-family: 'DM Serif Display', serif;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Controls */
  .controls {
    padding: 1rem 1.25rem 0.5rem;
    display: flex;
    gap: 8px;
  }
  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--amber); }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  .add-btn {
    background: var(--amber);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .add-btn:hover { background: var(--amber-dark); }

  /* Filter chips */
  .filters {
    padding: 0.75rem 1.25rem;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 100px;
    border: 0.5px solid var(--border-strong);
    cursor: pointer;
    background: var(--surface);
    color: var(--muted);
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip.active {
    background: var(--accent);
    color: #FAF8F3;
    border-color: var(--accent);
  }

  /* Inventory list */
  .inventory {
    padding: 0 1.25rem;
  }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    padding: 0.75rem 0 0.5rem;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .item:hover { border-color: var(--border-strong); }
  .item-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .item-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .badge-out {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 100px;
    background: var(--red-light);
    color: var(--red);
    font-weight: 500;
  }
  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 0.5px solid var(--border-strong);
    background: var(--bg);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    transition: background 0.1s;
    font-family: inherit;
  }
  .qty-btn:hover { background: var(--amber-light); border-color: var(--amber); }
  .qty-num {
    font-size: 15px;
    font-weight: 500;
    min-width: 20px;
    text-align: center;
    color: var(--text);
  }
  .del-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    line-height: 1;
    transition: color 0.1s;
  }
  .del-btn:hover { color: var(--red); }
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 14px;
  }

  /* Cocktail button */
  .cocktail-wrap {
    padding: 0.5rem 1.25rem 0;
  }
  .cocktail-btn {
    width: 100%;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 13px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, border-color 0.15s;
  }
  .cocktail-btn:hover { background: var(--amber-light); border-color: var(--amber); }
  .cocktail-btn .sparkle { font-size: 16px; }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,14,8,0.5);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 1.5rem;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border-strong);
    border-radius: 2px;
    margin: 0 auto 1.25rem;
  }
  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 1.25rem;
    color: var(--text);
  }
  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    appearance: none;
  }
  .field input:focus, .field select:focus { border-color: var(--amber); background: white; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.5rem; }
  .btn-cancel {
    flex: 1;
    padding: 12px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: transparent;
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    color: var(--muted);
  }
  .btn-save {
    flex: 2;
    padding: 12px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--accent);
    color: #FAF8F3;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #3D2416; }

  /* Cocktail modal result */
  .cocktail-result {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    white-space: pre-wrap;
    min-height: 80px;
  }
  .cocktail-loading {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 14px;
  }
  .dot-pulse { display: flex; gap: 4px; }
  .dot-pulse span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--amber);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
</style>
</head>
<body>

<header class="site-header">
  <h1>Home Bar</h1>
  <p id="last-updated">Tap to browse · tap + to add</p>
</header>

<div class="stats-row" id="stats"></div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search bottles…" oninput="render()">
  </div>
  <button class="add-btn" onclick="openAddModal()">+ Add</button>
</div>

<div class="filters" id="filters"></div>

<div class="inventory" id="inventory"></div>

<div class="cocktail-wrap">
  <button class="cocktail-btn" onclick="suggestCocktails()">
    <span class="sparkle">✦</span> What can I make tonight?
  </button>
</div>

<!-- Add bottle modal -->
<div class="modal-bg" id="add-modal" onclick="handleModalBgClick(event,'add-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Add a bottle</h2>
    <div class="field"><label>Bottle name</label><input type="text" id="m-name" placeholder="e.g. Bulleit Rye"></div>
    <div class="field"><label>Category</label>
      <select id="m-cat">
        <option>Whiskey</option><option>Bourbon</option><option>Scotch</option>
        <option>Gin</option><option>Vodka</option><option>Rum</option>
        <option>Tequila</option><option>Mezcal</option><option>Brandy</option>
        <option>Liqueur</option><option>Wine</option><option>Beer</option>
        <option>Vermouth</option><option>Bitters</option><option>Mixer</option><option>Other</option>
      </select>
    </div>
    <div class="field"><label>Quantity</label><input type="number" id="m-qty" value="1" min="0" max="99"></div>
    <div class="field"><label>Notes (optional)</label><input type="text" id="m-notes" placeholder="e.g. 750ml, birthday gift…"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn-save" onclick="addBottle()">Add bottle</button>
    </div>
  </div>
</div>

<!-- Cocktail modal -->
<div class="modal-bg" id="cocktail-modal" onclick="handleModalBgClick(event,'cocktail-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Tonight's options</h2>
    <div id="cocktail-result" class="cocktail-result"></div>
    <div class="modal-actions" style="margin-top:1.25rem">
      <button class="btn-save" style="flex:1" onclick="closeModal('cocktail-modal')">Done</button>
    </div>
  </div>
</div>

<script>
const CAT_COLORS = {
  Whiskey:'#7F77DD', Bourbon:'#C17E2A', Scotch:'#8B5A2B', Gin:'#2E8B57',
  Vodka:'#9E9E9E', Rum:'#C0392B', Tequila:'#27AE60', Mezcal:'#1A7A46',
  Brandy:'#A0522D', Liqueur:'#8E44AD', Wine:'#C0392B', Beer:'#E67E22',
  Vermouth:'#2980B9', Bitters:'#E74C3C', Mixer:'#7F8C8D', Other:'#95A5A6'
};

let inventory = JSON.parse(localStorage.getItem('hb_inventory') || 'null') || [
  {id:1,name:'Bulleit Bourbon',cat:'Bourbon',qty:1,notes:''},
  {id:2,name:"Hendrick's Gin",cat:'Gin',qty:2,notes:''},
  {id:3,name:"Tito's Vodka",cat:'Vodka',qty:1,notes:''},
  {id:4,name:'Diplomatico Rum',cat:'Rum',qty:1,notes:''},
  {id:5,name:'Espolòn Tequila',cat:'Tequila',qty:0,notes:'Restock soon'},
  {id:6,name:'Campari',cat:'Liqueur',qty:1,notes:''},
  {id:7,name:'Sweet Vermouth',cat:'Vermouth',qty:1,notes:''},
  {id:8,name:'Angostura Bitters',cat:'Bitters',qty:1,notes:''},
];
let nextId = Math.max(0, ...inventory.map(i=>i.id)) + 1;
let activeFilter = 'All';

function save() {
  localStorage.setItem('hb_inventory', JSON.stringify(inventory));
  const now = new Date();
  document.getElementById('last-updated').textContent =
    'Updated ' + now.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const cats = ['All', ...new Set(inventory.map(i => i.cat))];

  document.getElementById('filters').innerHTML = cats.map(c =>
    `<button class="chip ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');

  let items = inventory.filter(i => {
    if (activeFilter !== 'All' && i.cat !== activeFilter) return false;
    if (q && !i.name.toLowerCase().includes(q) && !i.cat.toLowerCase().includes(q)) return false;
    return true;
  });

  const total = inventory.length;
  const inStock = inventory.filter(i => i.qty > 0).length;
  const outOfStock = inventory.filter(i => i.qty === 0).length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Bottles</div></div>
    <div class="stat-card"><div class="stat-num">${inStock}</div><div class="stat-label">In stock</div></div>
    <div class="stat-card"><div class="stat-num">${outOfStock}</div><div class="stat-label">Out</div></div>`;

  if (!items.length) {
    document.getElementById('inventory').innerHTML = `<div class="empty">No bottles found</div>`;
    return;
  }

  const grouped = {};
  items.forEach(i => { if (!grouped[i.cat]) grouped[i.cat] = []; grouped[i.cat].push(i); });

  let html = '';
  for (const [cat, bottles] of Object.entries(grouped)) {
    if (activeFilter === 'All') html += `<div class="section-label">${cat}</div>`;
    bottles.forEach(item => {
      html += `<div class="item">
        <div class="item-dot" style="background:${CAT_COLORS[item.cat]||'#888'}"></div>
        <div class="item-info">
          <div class="item-name">
            ${item.name}
            ${item.qty === 0 ? '<span class="badge-out">out</span>' : ''}
          </div>
          ${item.notes ? `<div class="item-sub">${item.notes}</div>` : ''}
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
        <button class="del-btn" onclick="deleteItem(${item.id})" title="Remove">×</button>
      </div>`;
    });
  }
  document.getElementById('inventory').innerHTML = html;
}

function setFilter(f) { activeFilter = f; render(); }
function changeQty(id, d) {
  const i = inventory.find(x => x.id === id);
  if (i) { i.qty = Math.max(0, i.qty + d); save(); render(); }
}
function deleteItem(id) {
  if (!confirm('Remove this bottle?')) return;
  inventory = inventory.filter(x => x.id !== id);
  save(); render();
}

function openAddModal() {
  document.getElementById('m-name').value = '';
  document.getElementById('m-qty').value = 1;
  document.getElementById('m-notes').value = '';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('m-name').focus(), 80);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function handleModalBgClick(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

function addBottle() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { document.getElementById('m-name').focus(); return; }
  inventory.push({
    id: nextId++,
    name,
    cat: document.getElementById('m-cat').value,
    qty: parseInt(document.getElementById('m-qty').value) || 1,
    notes: document.getElementById('m-notes').value.trim()
  });
  save(); render();
  closeModal('add-modal');
}

async function suggestCocktails() {
  const inStock = inventory.filter(i => i.qty > 0).map(i => i.name);
  if (inStock.length < 2) { alert('Add at least 2 bottles to get cocktail suggestions.'); return; }

  document.getElementById('cocktail-result').innerHTML = `
    <div class="cocktail-loading">
      <div class="dot-pulse"><span></span><span></span><span></span></div>
      <span>Checking your bottles…</span>
    </div>`;
  document.getElementById('cocktail-modal').classList.add('open');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `My home bar has: ${inStock.join(', ')}.\n\nSuggest 5 cocktails I can make with what I have. For each, give the name, the key ingredients from my list, and a 1-sentence method. Be practical — only suggest drinks where I have the core spirits. Format each clearly with the cocktail name on its own line followed by the details.`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || 'No suggestions returned.';
    document.getElementById('cocktail-result').textContent = text;
  } catch (e) {
    document.getElementById('cocktail-result').textContent = 'Could not reach the AI service. Make sure you have an internet connection and try again.';
  }
}

render();
</script>
</body>
</html>
